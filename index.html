<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="main-container">
        <div class="display-container">
            <div class="display">0</div>
        </div>
        <div class="button-container">
            <div class="extra-button-container">
                <button class="button extra reset">AC</button>
                <button class="button extra backspace">⌫</button>
            </div>
            <div class="main-button-container">
                <button class="button primary digit">1</button>
                <button class="button primary digit">2</button>
                <button class="button primary digit">3</button>
                <button class="button primary operator">÷</button>
                <button class="button primary digit">4</button>
                <button class="button primary digit">5</button>
                <button class="button primary digit">6</button>
                <button class="button primary operator">×</button>
                <button class="button primary digit">7</button>
                <button class="button primary digit">8</button>
                <button class="button primary digit">9</button>
                <button class="button primary operator">−</button>
                <button class="button primary digit">0</button>
                <button class="button primary digit">.</button>
                <button class="button primary equal">=</button>
                <button class="button primary operator">+</button>
            </div>
        </div>
    </div>
</body>
</html>
